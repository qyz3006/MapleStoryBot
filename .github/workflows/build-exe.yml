name: Build Python EXE via PyInstaller

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Patch main.py for External Imports
      shell: pwsh
      run: |
        # 核心修复：动态向 main.py 头部注入代码，强行让 .exe 能够识别外部下载的 resources 文件夹
        $path_patch = @"
        import sys, os
        if getattr(sys, 'frozen', False):
            exe_dir = os.path.dirname(sys.executable)
            if exe_dir not in sys.path:
                sys.path.insert(0, exe_dir)
        "@
        $original_content = Get-Content main.py -Raw
        Set-Content main.py -Value ($path_patch + "`n" + $original_content) -Encoding utf8

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onedir --name=MapleStoryBot --collect-all tensorflow --collect-all cv2 --collect-all git main.py

    - name: Copy Assets and Resources
      shell: pwsh
      run: |
        if (Test-Path ".gitmodules") { Copy-Item -Path ".gitmodules" -Destination "dist/MapleStoryBot/" -Force }
        if (Test-Path "assets") { Copy-Item -Path "assets" -Destination "dist/MapleStoryBot/assets" -Recurse -Force }
        if (Test-Path "images") { Copy-Item -Path "images" -Destination "dist/MapleStoryBot/images" -Recurse -Force }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MapleStoryBot-Windows-Pack
        path: dist/MapleStoryBot/
